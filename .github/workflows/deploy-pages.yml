name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Drop file://-only texture sidecars from the site
        # local-data/ holds base64 copies of the WebP maps used only when the
        # sim is opened from disk (file://); browsers on the hosted site never
        # fetch them, so keep the ~8.6 MB out of the deployed artifact.
        run: rm -rf assets/img/textures/local-data

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (index.html lives at the root).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
